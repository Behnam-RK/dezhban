name: Release

# Manually-dispatched release. The ordering is the whole design:
#
#   prepare  resolve the version and gate on CI — WITHOUT writing anything
#   build    cross-compile everything and smoke-test the installer
#   publish  only now: tag, publish, and open the CHANGELOG PR
#
# Nothing touches the repository until every artifact has been built and the
# installer has been proven to install and uninstall cleanly. A failed build
# therefore leaves NO tag behind, and re-dispatching is free. (The previous order
# tagged first, so a failed build stranded a tag that the workflow's own "tag
# already exists" guard then refused to retry.)
#
# The workflow NEVER pushes to main. The `main` ruleset requires a pull request,
# and github-actions[bot] cannot bypass it — GitHub only allows the Actions app as
# a ruleset bypass actor on ORG-owned repos, and this one is user-owned. Tags are
# not branch-ruled, so the tag and the release go out directly; a final release's
# CHANGELOG roll arrives as an auto-opened PR for you to merge.
#
# All version/CHANGELOG logic lives in scripts/release.sh — the same code
# `task release:preview` runs locally, so a preview cannot drift from this.
#
# There is no tag-push trigger by design: `publish` is what creates the tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Exact version, e.g. 0.2.0 or 0.2.0-rc.1 (no leading "v"). Required for
          the first release, and to OPEN a new rc line. Leave blank to bump.
        required: false
        type: string
      bump:
        description: Bump applied to the latest tag (ignored when "version" is set)
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - rc      # advance an existing rc line: 0.2.0-rc.1 -> 0.2.0-rc.2
      dry_run:
        description: >-
          Build and smoke-test everything, then STOP. Publishes nothing: no tag,
          no commit, no release. Artifacts are uploaded for inspection.
        required: false
        type: boolean
        default: false
      force:
        description: Skip the "CI must be green on this commit" gate. Emergencies only.
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read           # reading ci.yml's conclusion for the release gate
  pull-requests: write    # the CHANGELOG roll lands as a PR (main requires one)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Resolves the version and gates on CI. Writes nothing, anywhere.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pin.outputs.sha }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
      kind: ${{ steps.version.outputs.kind }}
    steps:
      # `publish` pushes to main. Dispatched from another branch, that push would
      # fast-forward main to the dispatch ref rather than just the changelog commit.
      - name: Require dispatch from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "error: Release must be dispatched from 'main' (got ${{ github.ref }})" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # tags, for version resolution

      # Pin the exact commit. Everything downstream builds from THIS sha, and
      # `publish` refuses to run if main has moved off it in the meantime — so a
      # merge landing mid-release can never ship a tree that was never tested.
      - name: Pin the release commit
        id: pin
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: version
        run: |
          set -eu
          if [ -n "${{ inputs.version }}" ]; then
            sel="--version ${{ inputs.version }}"
          else
            sel="--bump ${{ inputs.bump }}"
          fi
          # resolve emits TAG/VERSION/VERSION_NUM/KIND/PREV_TAG, and fails on a
          # non-semver, already-taken, or non-monotonic version.
          resolved="$(bash scripts/release.sh resolve $sel)"
          echo "$resolved"
          eval "$resolved"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "version_num=$VERSION_NUM"
            echo "kind=$KIND"
          } >> "$GITHUB_OUTPUT"

      # Ship only what CI actually blessed. Waits out an in-flight run (you may
      # well dispatch straight after a merge), aborts on red or missing.
      - name: Require green CI on the release commit
        if: ${{ !inputs.force }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.pin.outputs.sha }}
        run: |
          set -eu
          deadline=$(( $(date +%s) + 900 ))   # 15 minutes
          while :; do
            run="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
                     --jq '.workflow_runs[0] | "\(.status) \(.conclusion)"' 2>/dev/null || echo "")"
            status="${run%% *}"
            conclusion="${run##* }"

            case "$status" in
              completed)
                [ "$conclusion" = success ] && { echo "CI is green on $SHA"; exit 0; }
                echo "error: CI concluded '$conclusion' on $SHA — refusing to release it." >&2
                echo "       Fix CI, or re-dispatch with force=true if this is an emergency." >&2
                exit 1
                ;;
              queued|in_progress|waiting|requested|pending)
                echo "CI is '$status' on $SHA — waiting..."
                ;;
              *)
                echo "error: no CI run found for $SHA — refusing to release an untested commit." >&2
                echo "       Push the commit so ci.yml runs, or re-dispatch with force=true." >&2
                exit 1
                ;;
            esac

            [ "$(date +%s)" -lt "$deadline" ] || {
              echo "error: timed out after 15m waiting for CI on $SHA" >&2
              exit 1
            }
            sleep 20
          done

      - name: Announce a forced release
        if: ${{ inputs.force }}
        run: |
          echo "::warning title=CI gate forced::Releasing ${{ steps.version.outputs.tag }} WITHOUT a green CI check on ${{ steps.pin.outputs.sha }}"

      # Extracted here, from the un-rolled CHANGELOG. This must happen BEFORE
      # `publish` rolls it — rolling empties the [Unreleased] section these notes
      # are read from.
      - name: Render release notes
        run: bash scripts/release.sh notes "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.kind }}" > release-notes.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Summary
        run: |
          {
            echo "### ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.kind }})"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| commit | \`${{ steps.pin.outputs.sha }}\` |"
            echo "| dry run | ${{ inputs.dry_run }} |"
            echo "| CI gate | ${{ inputs.force && '**FORCED**' || 'green' }} |"
            echo
            echo "#### Notes"
            echo
            cat release-notes.md
          } >> "$GITHUB_STEP_SUMMARY"

  # The .pkg needs the app bundle and both darwin slices anyway, so the standalone
  # app zip comes off the same runner for free.
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer
        run: task pkg:build VERSION=${{ needs.prepare.outputs.tag }}

      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/Dezhban.app dist/Dezhban-macos.app.zip

      # Prove the installer installs before it ships. The runners have passwordless
      # sudo, so this is the real flow: the payload lands, the LaunchDaemon is
      # registered, and — critically — enforcement is NOT started (a kill switch
      # must not arm itself on install). Then the shipped uninstaller must leave
      # nothing behind.
      - name: Smoke-test the installer
        run: |
          set -eu
          pkg="dist/dezhban-${{ needs.prepare.outputs.version }}.pkg"
          test -f "$pkg" || { echo "installer not built: $pkg" >&2; ls -la dist >&2; exit 1; }
          sudo installer -pkg "$pkg" -target /

          test -x /usr/local/bin/dezhban || { echo "CLI not installed" >&2; exit 1; }
          /usr/local/bin/dezhban version -v
          test -d /Applications/Dezhban.app || { echo "app not installed" >&2; exit 1; }
          test -f /Library/LaunchDaemons/dezhban.plist || { echo "LaunchDaemon not registered" >&2; exit 1; }
          test -x /usr/local/share/dezhban/uninstall.sh || { echo "uninstaller not installed" >&2; exit 1; }

          # The installed binary must report the version we are releasing.
          got="$(/usr/local/bin/dezhban version | awk '{print $2}')"
          [ "$got" = "${{ needs.prepare.outputs.tag }}" ] || {
            echo "error: installed binary reports '$got', expected '${{ needs.prepare.outputs.tag }}'" >&2
            exit 1
          }

          if sudo launchctl print system/dezhban >/dev/null 2>&1; then
            echo "error: the installer started enforcement; it must only register the service" >&2
            exit 1
          fi

          sudo sh /usr/local/share/dezhban/uninstall.sh
          for p in /usr/local/bin/dezhban /Applications/Dezhban.app /Library/LaunchDaemons/dezhban.plist /etc/dezhban /var/db/dezhban; do
            if [ -e "$p" ]; then echo "error: uninstall left $p behind" >&2; exit 1; fi
          done
          if pkgutil --pkgs | grep -q '^com\.behnam-rk\.dezhban'; then
            echo "error: uninstall left pkg receipts behind" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/Dezhban-macos.app.zip
            dist/dezhban-${{ needs.prepare.outputs.version }}.pkg

  build-cli:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all CLI platforms
        run: task build:all VERSION=${{ needs.prepare.outputs.tag }}

      - uses: actions/upload-artifact@v4
        with:
          name: cli-artifacts
          path: |
            dist/dezhban-darwin-arm64
            dist/dezhban-darwin-amd64
            dist/dezhban-linux-amd64
            dist/dezhban-linux-arm64
            dist/dezhban-windows-amd64.exe

  # The first and only job that writes anything. Skipped entirely on a dry run.
  publish:
    needs: [prepare, build-macos, build-cli]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Everything above was built and tested at prepare.sha. If main has moved,
      # the tree we tested is not the tree we would be tagging — stop.
      - name: Refuse to publish if main moved
        run: |
          set -eu
          now="$(git rev-parse HEAD)"
          want="${{ needs.prepare.outputs.sha }}"
          if [ "$now" != "$want" ]; then
            echo "error: main moved during the release ($want -> $now)." >&2
            echo "       The artifacts were built and tested at $want. Re-dispatch." >&2
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with: { name: cli-artifacts, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: macos-artifacts, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: release-notes, path: . }

      # SHA256SUMS covers the .pkg too — it is the asset most people download, and
      # an unsigned installer is exactly the one worth verifying by hash.
      - name: Checksums
        run: cd dist && shasum -a 256 * > SHA256SUMS

      # The tag lands on prepare.sha — the exact tree that was built and tested —
      # for BOTH kinds. The workflow never pushes to main: the `main` ruleset
      # requires a pull request, and github-actions[bot] cannot bypass it (GitHub
      # only allows the Actions app as a bypass actor on ORG-owned rulesets, and
      # this repo is user-owned). Tags are not branch-ruled, so tagging is fine.
      #
      # A final's CHANGELOG roll therefore arrives as a PR, opened below.
      - name: Tag the release commit
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG" "$SHA"
          git push origin "$TAG"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          KIND: ${{ needs.prepare.outputs.kind }}
        run: |
          set -eu
          prerelease=""
          [ "$KIND" = rc ] && prerelease="--prerelease"

          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $prerelease \
            "dist/dezhban-$VERSION.pkg" \
            dist/dezhban-darwin-arm64 \
            dist/dezhban-darwin-amd64 \
            dist/dezhban-linux-amd64 \
            dist/dezhban-linux-arm64 \
            dist/dezhban-windows-amd64.exe \
            dist/Dezhban-macos.app.zip \
            dist/SHA256SUMS

          echo "### Published [$TAG](https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG)" >> "$GITHUB_STEP_SUMMARY"

      # A final's CHANGELOG roll lands as a PR, because main requires one. Runs
      # AFTER the release is out: the tag and the release are the release, and this
      # is bookkeeping. If it fails, the release still shipped — you just have to
      # open the PR by hand (`bash scripts/release.sh roll X.Y.Z`), which the error
      # says. An rc rolls nothing, so it skips this entirely.
      - name: Open the CHANGELOG PR
        if: ${{ needs.prepare.outputs.kind == 'final' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -eu
          branch="release/$TAG"
          bash scripts/release.sh roll "$VERSION"

          git checkout -b "$branch"
          git add CHANGELOG.md
          git commit -m "chore(release): $TAG [skip ci]"
          git push origin "$branch"

          # Plain <<EOF, body at the block's own indent. NOT <<-EOF with tabs:
          # YAML forbids tabs as indentation, so a tab-indented heredoc silently
          # terminates the `run: |` block scalar and GitHub then fails to parse the
          # workflow at all (it drops the workflow_dispatch trigger). YAML strips
          # this indent, so the shell sees the body at column 0.
          cat > pr-body.md <<EOF
          Rolls \`## [Unreleased]\` into \`## [$VERSION]\` for
          [$TAG](https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG), which is
          **already published** — this PR is the bookkeeping.

          Opened by the Release workflow. It does not push to \`main\` directly: the
          branch ruleset requires a pull request, and \`github-actions[bot]\` cannot
          bypass it.
          EOF

          url="$(gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(release): $TAG" \
            --body-file pr-body.md)"

          echo "### CHANGELOG PR: $url" >> "$GITHUB_STEP_SUMMARY"
          echo "merge it to roll the changelog on main" >> "$GITHUB_STEP_SUMMARY"

  # Make a dry run say so loudly, rather than looking like a release that silently
  # did nothing.
  dry-run-summary:
    needs: [prepare, build-macos, build-cli]
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          {
            echo "## Dry run — nothing was published"
            echo
            echo "\`${{ needs.prepare.outputs.tag }}\` built and smoke-tested at \`${{ needs.prepare.outputs.sha }}\`."
            echo "No tag was pushed, no commit was made, no release was created."
            echo "The artifacts are attached to this run."
            echo
            echo "Re-dispatch with \`dry_run: false\` to publish."
          } >> "$GITHUB_STEP_SUMMARY"
