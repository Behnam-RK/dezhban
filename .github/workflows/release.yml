name: Release

# Manually-dispatched release: resolve a version, roll the CHANGELOG's
# [Unreleased] section into a dated entry, tag it, cross-compile every
# platform (+ the macOS GUI), and publish a GitHub Release with checksums.
#
# There is no tag-push trigger by design — `prepare` is what creates the tag,
# so triggering on tag-push would be redundant with this workflow's own push.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Exact version to release, e.g. 0.1.0 (no leading "v"). Required for
          the first release since there is no prior tag to bump from. Leave
          blank on later releases to auto-bump from the latest tag.
        required: false
        type: string
      bump:
        description: Version bump to apply to the latest tag (ignored if "version" is set)
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      # `prepare` commits + pushes to main (git push origin HEAD:main). If this
      # workflow were dispatched from another branch, that push would fast-forward
      # main to the dispatch ref, not just the changelog commit. Refuse anything
      # but main up front.
      - name: Require dispatch from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "error: Release must be dispatched from 'main' (got ${{ github.ref }})" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          set -eu
          semver_re='^[0-9]+\.[0-9]+\.[0-9]+$'

          input_version="${{ inputs.version }}"
          input_version="${input_version#v}"

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"

          if [ -n "$input_version" ]; then
            new_version="$input_version"
          else
            if [ -z "$latest_tag" ]; then
              echo "error: no existing tag to bump from; pass an explicit 'version' input for the first release" >&2
              exit 1
            fi
            latest_version="${latest_tag#v}"
            echo "$latest_version" | grep -Eq "$semver_re" || {
              echo "error: latest tag $latest_tag is not strict X.Y.Z semver; pass an explicit 'version' input to bump from" >&2
              exit 1
            }
            major="$(echo "$latest_version" | cut -d. -f1)"
            minor="$(echo "$latest_version" | cut -d. -f2)"
            patch="$(echo "$latest_version" | cut -d. -f3)"
            case "${{ inputs.bump }}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch|*) patch=$((patch + 1)) ;;
            esac
            new_version="$major.$minor.$patch"
          fi

          echo "$new_version" | grep -Eq "$semver_re" || {
            echo "error: '$new_version' is not a valid X.Y.Z semver" >&2
            exit 1
          }

          new_tag="v$new_version"

          if [ -n "$latest_tag" ]; then
            highest="$(printf '%s\n%s\n' "$latest_tag" "$new_tag" | sort -V | tail -n1)"
            if [ "$highest" != "$new_tag" ] || [ "$latest_tag" = "$new_tag" ]; then
              echo "error: $new_tag is not greater than the latest tag $latest_tag" >&2
              exit 1
            fi
          fi

          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "error: tag $new_tag already exists" >&2
            exit 1
          fi

          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "releasing $new_tag (latest was: ${latest_tag:-none})"

      - name: Roll CHANGELOG [Unreleased] section
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -eu

          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "error: CHANGELOG.md has no '## [Unreleased]' heading" >&2
            exit 1
          fi

          body="$(awk '/^## \[Unreleased\]$/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md)"
          # Trim the leading/trailing blank lines the heading split leaves behind.
          body="$(printf '%s\n' "$body" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}')"
          if [ -z "$(echo "$body" | tr -d '[:space:]')" ]; then
            echo "error: [Unreleased] section is empty; nothing to release" >&2
            exit 1
          fi

          date="$(date -u +%Y-%m-%d)"
          repo_url="https://github.com/${GITHUB_REPOSITORY}"

          # Trim trailing blank lines so the first-release ref append below
          # gets exactly one blank separator.
          sed -e :a -e '/^\s*$/{$d;N;ba' -e '}' CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

          # Single pass: split the Unreleased heading into a fresh empty
          # Unreleased + the dated version heading, and replace the existing
          # [Unreleased] compare link (top of the ref block) with a refreshed
          # [Unreleased] link plus the new version's release link. Existing
          # version refs below it are preserved so older release headings keep
          # their links. The END fallback covers a changelog missing the
          # [Unreleased] ref line entirely.
          awk -v date="$date" -v ver="$VERSION" -v url="$repo_url" -v tag="$TAG" '
            /^## \[Unreleased\]$/ {
              print "## [Unreleased]"
              print ""
              print "## [" ver "] - " date
              next
            }
            /^\[Unreleased\]:/ {
              print "[Unreleased]: " url "/compare/" tag "...HEAD"
              print "[" ver "]: " url "/releases/tag/" tag
              refdone = 1
              next
            }
            { print }
            END {
              if (!refdone) {
                print ""
                print "[Unreleased]: " url "/compare/" tag "...HEAD"
                print "[" ver "]: " url "/releases/tag/" tag
              }
            }
          ' CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

          {
            echo "notes<<CHANGELOG_EOF"
            echo "$body"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): $TAG [skip ci]"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"

      - name: Save release notes
        env:
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: printf '%s\n' "$NOTES" > release-notes.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  # Both macOS artifacts come from one runner: the .pkg needs the app bundle and the
  # cross-compiled darwin binaries anyway, so building the standalone zip alongside
  # it costs nothing extra.
  macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Builds the darwin CLI slices + the universal app, then the installer.
      - name: Build installer
        run: make pkg-macos VERSION=${{ needs.prepare.outputs.tag }}

      # The .app zip stays a separate asset for anyone who only wants the menubar
      # app (e.g. Homebrew users who already have the CLI).
      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/Dezhban.app dist/Dezhban-macos.app.zip

      # Prove the installer actually installs before it ships. GitHub's macOS
      # runners have passwordless sudo, so this exercises the real flow: the
      # payload lands, the LaunchDaemon is registered, and — critically —
      # enforcement is NOT started (a kill switch must not arm itself on install).
      - name: Smoke-test the installer
        run: |
          set -eu
          pkg="dist/dezhban-${{ needs.prepare.outputs.version }}.pkg"
          sudo installer -pkg "$pkg" -target /

          test -x /usr/local/bin/dezhban || { echo "CLI not installed" >&2; exit 1; }
          /usr/local/bin/dezhban version
          test -d /Applications/Dezhban.app || { echo "app not installed" >&2; exit 1; }
          test -f /Library/LaunchDaemons/dezhban.plist || { echo "LaunchDaemon not registered" >&2; exit 1; }
          test -x /usr/local/share/dezhban/uninstall.sh || { echo "uninstaller not installed" >&2; exit 1; }

          if sudo launchctl print system/dezhban >/dev/null 2>&1; then
            echo "error: the installer started enforcement; it must only register the service" >&2
            exit 1
          fi

          sudo sh /usr/local/share/dezhban/uninstall.sh
          for p in /usr/local/bin/dezhban /Applications/Dezhban.app /Library/LaunchDaemons/dezhban.plist /etc/dezhban /var/db/dezhban; do
            if [ -e "$p" ]; then echo "error: uninstall left $p behind" >&2; exit 1; fi
          done
          if pkgutil --pkgs | grep -q '^com\.behnam-rk\.dezhban'; then
            echo "error: uninstall left pkg receipts behind" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/Dezhban-macos.app.zip
            dist/dezhban-${{ needs.prepare.outputs.version }}.pkg

  release:
    needs: [prepare, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all CLI platforms
        run: make build-all VERSION=${{ needs.prepare.outputs.tag }}

      # Lands both the .app zip and the .pkg in dist/ BEFORE the checksums step, so
      # SHA256SUMS covers the installer too — it is the asset most people download,
      # and an unsigned installer is exactly the one worth verifying by hash.
      - uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Checksums
        run: |
          set -eu
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -eu
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            "dist/dezhban-$VERSION.pkg" \
            dist/dezhban-darwin-arm64 \
            dist/dezhban-darwin-amd64 \
            dist/dezhban-linux-amd64 \
            dist/dezhban-linux-arm64 \
            dist/dezhban-windows-amd64.exe \
            dist/Dezhban-macos.app.zip \
            dist/SHA256SUMS
