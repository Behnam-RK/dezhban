name: CI

on:
  push:
    branches: [main]
  # PR runs are gated on the `run-ci` label so routine review pushes don't burn
  # CI on every commit. Adding the label fires a `labeled` event that runs CI;
  # while the label is present, later pushes (synchronize) run too. Remove it to
  # stop runs again. The per-job `if` below enforces the gate.
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read

# Gate: jobs run on any push to main, OR a PR carrying the `run-ci` label.
jobs:
  # Vet + test on the supported OSes. Each runner compiles and tests its OWN
  # build-tagged firewall backend (pf/nft), so a backend that fails to build — e.g.
  # a missing RenderRules on a non-host OS — is caught here, not at release time.
  #
  # windows-latest is deliberately NOT in this matrix yet. Windows is an unfinished
  # target: the control socket's whole authorization model is unix mode+ownership,
  # which Windows has no equivalent of (perms_windows.go's secureSocket is a no-op),
  # so the tests that pin that boundary cannot pass there and the passwordless path
  # is not a supported Windows feature today. Running them anyway just produces a red
  # X that means "Windows isn't done", which we already know. build-all still
  # cross-compiles the windows binary, so the code cannot bit-rot in the meantime.
  # Put windows-latest back when Windows support is real — the tests are the spec
  # it will have to meet.
  test:
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-ci')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      # Race detector once (ubuntu): the runner toggles posture from a ticker
      # loop with a recovery probe — catch data races there.
      - if: matrix.os == 'ubuntu-latest'
        run: go test -race ./...
      # Keep the windows backend compiling even though we don't test it yet (see
      # the matrix comment). Vet, not just build: it type-checks the _windows.go
      # files that no runner in the matrix ever touches.
      - if: matrix.os == 'ubuntu-latest'
        run: GOOS=windows go vet ./...

  # Verify gofmt cleanliness once (formatting is OS-independent).
  fmt:
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

  # scripts/*.sh run as root on other people's machines (install.sh, upgrade
  # helpers) — lint them like it matters.
  shellcheck:
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # -S warning: fail on warning/error, not on shellcheck's "info"-level style
      # notes (e.g. SC2015's A && B || C caveat in release.sh, a pre-existing,
      # deliberate idiom there — not something this gate exists to relitigate).
      - name: shellcheck
        run: shellcheck -S warning scripts/*.sh packaging/macos/*.sh packaging/linux/*.sh

  # Cross-compile all five release targets and assert every artifact exists.
  build-all:
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task build:all
      - name: verify artifacts
        run: |
          set -eu
          for f in \
            dist/dezhban-darwin-arm64 \
            dist/dezhban-darwin-amd64 \
            dist/dezhban-linux-amd64 \
            dist/dezhban-linux-arm64 \
            dist/dezhban-windows-amd64.exe; do
            test -f "$f" || { echo "missing artifact: $f"; exit 1; }
          done
          echo "all 5 artifacts present"
